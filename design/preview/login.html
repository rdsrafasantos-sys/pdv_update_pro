<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PDV Updater — Login</title>
<link rel="stylesheet" href="style.css">
<style>
  body.login-bg {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background:
      radial-gradient(900px 500px at 18% -10%, rgba(255,122,26,0.10), transparent 60%),
      radial-gradient(700px 500px at 100% 100%, rgba(52,214,224,0.07), transparent 60%),
      var(--bg);
  }
  .login-card {
    width: 380px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 34px 32px 28px; box-shadow: var(--shadow-soft);
  }
  .login-brand { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 26px; }
  .login-mark {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, var(--orange), #ff9a4d);
    box-shadow: 0 0 0 1px var(--orange-glow), 0 8px 24px var(--orange-dim);
    display: flex; align-items: center; justify-content: center; font-weight: 800; color: #1a0f00; font-size: 19px;
  }
  .login-title { font-size: 16px; font-weight: 700; }
  .login-sub { font-size: 12px; color: var(--text-faint); margin-top: -6px; }
  .field { margin-bottom: 14px; }
  .login-card .btn-primary { width: 100%; justify-content: center; padding: 11px; margin-top: 6px; }
  .divider-text {
    display: flex; align-items: center; gap: 10px; color: var(--text-faint);
    font-size: 11px; margin: 18px 0; text-transform: uppercase; letter-spacing: .06em;
  }
  .divider-text::before, .divider-text::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .sso-btn {
    width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
    background: var(--bg-elevated); color: var(--text); font-size: 12.8px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
  }
  .login-foot { text-align: center; margin-top: 22px; font-size: 11.5px; color: var(--text-faint); }
  .login-foot .lock { display:inline-flex; align-items:center; gap:5px; }
</style>
</head>
<body class="login-bg" data-theme="dark">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-mark">VR</div>
      <div class="login-title">PDV <span style="color:var(--orange)">Updater</span></div>
      <div class="login-sub">Painel central de redes, lojas e PDVs</div>
    </div>

    <div class="field">
      <label>E-mail corporativo</label>
      <input type="email" placeholder="rafael.santos@vrsoft.com.br">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" placeholder="••••••••••••">
    </div>

    <button class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Entrar
    </button>

    <div class="divider-text">verificação em duas etapas obrigatória</div>

    <div class="sso-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Continuar com código do autenticador
    </div>

    <div class="login-foot">
      <span class="lock">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Conexão criptografada · sessão expira em 30min de inatividade
      </span>
    </div>
  </div>
</body>
</html>
