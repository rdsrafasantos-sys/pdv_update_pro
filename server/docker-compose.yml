services:
  pdv-server:
    build: .
    container_name: pdv-server
    restart: always
    # network_mode: host (em vez de bridge + "ports") porque o app precisa de
    # rotas IPv6 reais para os subnet routers 4via6 do Tailscale (ver secao
    # "Tailscale" do README) -- uma rede em bridge nao propaga IPv6 pro
    # container por padrao, e os nomes "*-via-<site>" so resolvem para IPv6.
    # Com host networking, "localhost" dentro do container passa a ser o
    # proprio host (isso muda o default do PDV_SERVER_MONGO_URI abaixo).
    network_mode: host
    dns:
      # Docker reescreve /etc/resolv.conf do container mesmo em
      # network_mode: host -- sem isto, ele usa 8.8.8.8/1.1.1.1 e nao
      # resolve nomes "*-via-<site>" do MagicDNS do Tailscale.
      # 1.1.1.1 primeiro: dominios externos (api.tailscale.com, Docker Hub)
      # resolvem sem esperar o timeout do MagicDNS. 100.100.100.100 como
      # fallback para nomes "*-via-<site>" que so o Tailscale conhece.
      - 1.1.1.1
      - 100.100.100.100
    environment:
      - PDV_SERVER_PORTA=8888
      - "PDV_SERVER_TOKEN=${PDV_SERVER_TOKEN:?PDV_SERVER_TOKEN nao configurado - defina no .env}"
      - PDV_SERVER_MONGO_URI=${PDV_SERVER_MONGO_URI:-mongodb://localhost:27016}
      # Obrigatorias -- sem elas o processo nao sobe (ver auth/ e app.py).
      # Gere uma vez por instalacao e NUNCA reaproveite entre clientes:
      #   PDV_MASTER_KEY: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      #   PDV_SECRET_KEY: python -c "import secrets; print(secrets.token_hex(32))"
      - PDV_MASTER_KEY=${PDV_MASTER_KEY}
      - PDV_SECRET_KEY=${PDV_SECRET_KEY}
      # Automacao da tela de Instalacao (Tailscale API -- ver README e .env.example)
      - PDV_TAILSCALE_AUTH_KEY_SERVICE_MANAGER=${PDV_TAILSCALE_AUTH_KEY_SERVICE_MANAGER:-}
      - PDV_TAILSCALE_OAUTH_CLIENT_ID=${PDV_TAILSCALE_OAUTH_CLIENT_ID:-}
      - PDV_TAILSCALE_OAUTH_CLIENT_SECRET=${PDV_TAILSCALE_OAUTH_CLIENT_SECRET:-}
      - PDV_TAILSCALE_TAILNET=${PDV_TAILSCALE_TAILNET:--}
      - PDV_TAILSCALE_AUTH_KEY_PDV=${PDV_TAILSCALE_AUTH_KEY_PDV:-}
      - PDV_TAILSCALE_AUTH_KEY_PDV_ID=${PDV_TAILSCALE_AUTH_KEY_PDV_ID:-}
      - PDV_PAINEL_CALLBACK_URL=${PDV_PAINEL_CALLBACK_URL:-}
      - PDV_SETUP_UPLOAD_TOKEN=${PDV_SETUP_UPLOAD_TOKEN:-}
      # E-mail (reset de senha) -- ver README/.env.example. Sem RESEND_API_KEY,
      # o botao "esqueci minha senha" so registra o pedido, sem enviar nada.
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_REMETENTE=${EMAIL_REMETENTE:-}
      - PDV_PAINEL_URL_PUBLICA=${PDV_PAINEL_URL_PUBLICA:-}
    volumes:
      - ./data/uploads:/opt/pdv-server/uploads
      - ./data/replicacao:/opt/pdv-server/replicacao
      - ./data/erp_db:/opt/pdv-server/erp_db
      - ./data/integrador:/opt/pdv-server/integrador
      - ./data/auth:/opt/pdv-server/auth
      - ./data/setup:/opt/pdv-server/setup
