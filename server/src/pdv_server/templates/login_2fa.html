<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDV Updater — Verificação em duas etapas</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
<style>
  body.login-bg {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background:
      radial-gradient(900px 500px at 18% -10%, rgba(255,122,26,0.10), transparent 60%),
      radial-gradient(700px 500px at 100% 100%, rgba(52,214,224,0.07), transparent 60%),
      var(--bg);
  }
  .login-card {
    width: 380px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 34px 32px 28px; box-shadow: var(--shadow-soft); text-align: center;
  }
  .login-mark {
    width: 46px; height: 46px; border-radius: 12px; margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--cyan), #7be7ee);
    display: flex; align-items: center; justify-content: center; color: #04282b; font-size: 19px;
  }
  .login-title { font-size: 16px; font-weight: 700; }
  .login-sub { font-size: 12px; color: var(--text-faint); margin: 6px 0 22px; }
  .codigo-input {
    width: 100%; text-align: center; font-family: var(--font-mono); font-size: 22px;
    letter-spacing: 6px; padding: 12px; border-radius: var(--radius-sm);
    background: var(--bg-elevated); border: 1px solid var(--border-strong); color: var(--text);
  }
  .login-card .btn-primary { width: 100%; justify-content: center; padding: 11px; margin-top: 14px; border: none; font-size: 13.5px; }
  .flash { font-size: 12.5px; border-radius: var(--radius-sm); padding: 9px 12px; margin-bottom: 14px; }
  .flash-erro { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,92,114,.3); }
</style>
</head>
<body class="login-bg" data-theme="dark">
  <div class="login-card">
    <div class="login-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <div class="login-title">Verificação em duas etapas</div>
    <div class="login-sub">Digite o código de 6 dígitos do seu autenticador</div>

    {% with mensagens = get_flashed_messages(with_categories=true) %}
      {% for categoria, msg in mensagens %}
        <div class="flash flash-{{ categoria }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" action="{{ url_for('auth.verificar_2fa') }}">
      <input class="codigo-input" type="text" name="codigo" inputmode="numeric" pattern="[0-9]*"
             maxlength="6" placeholder="000000" autofocus required>
      <button class="btn btn-primary" type="submit">Confirmar</button>
    </form>
  </div>
</body>
</html>
